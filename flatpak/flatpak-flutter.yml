id: dev.fredol.fred-tv-next
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: open_tv
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.gnome.SessionManager
modules:
  - modules/mpv.yml
  - name: open_tv
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: flutter/build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: flutter/build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/run/build/open_tv/flutter-sdk/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/open_tv/.pub-cache
        CC: clang
        CXX: clang++
    build-commands:
      - cargo build --release --offline
      - install -Dm755 target/release/libfred_tv_lib.so flutter/linux/libs/libfred_tv_lib.so
      - (cd flutter && flutter build linux --release --no-pub --verbose)
      - install -Dm755 $BUNDLE_PATH/open_tv /app/bin/open_tv
      - cp -r $BUNDLE_PATH/lib /app/bin/lib
      - cp -r $BUNDLE_PATH/data /app/bin/data
      - install -Dm644 dev.fredol.fred-tv-next.desktop /app/share/applications/dev.fredol.fred-tv-next.desktop
      - install -Dm644 dev.fredol.fred-tv-next.metainfo.xml /app/share/metainfo/dev.fredol.fred-tv-next.metainfo.xml
      - install -Dm644 flutter/assets/icon.png /app/share/icons/hicolor/512x512/apps/dev.fredol.fred-tv-next.png
    sources:
      - type: git
        url: https://github.com/Fredolx/fred-tv-mobile.git
        commit: 5108c47fa1234f16ad2de0b8fc7875b720d7e76e
      - type: file
        path: dev.fredol.fred-tv-next.desktop
      - type: file
        path: dev.fredol.fred-tv-next.metainfo.xml
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.44.4
        dest: flutter-sdk
