name: Flatpak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Pin app source to this commit
        run: |
          sed -i "0,/commit: .*/s//commit: ${GITHUB_SHA}/" flatpak/dev.fredol.fred-tv-next.yml

      - name: Build bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fred-tv-next.flatpak
          manifest-path: flatpak/dev.fredol.fred-tv-next.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: x86_64
